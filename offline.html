<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#08100e" />
<title>斬 — Offline</title>
<style>
  :root{--bg:#08100e;--cream:#e9e3d2;--muted:#7f988f;--red:#e8472e;--red-dim:#7a2418;--teal:#3fd6b0;--line:#2c4842}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,"Segoe UI",sans-serif;color:var(--cream);
    background:
      radial-gradient(900px 700px at 78% -10%, #0f2420 0%, transparent 60%),
      radial-gradient(700px 600px at 10% 110%, #12100a 0%, transparent 55%),
      var(--bg);
    min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
  }
  .glyph{
    width:84px;height:84px;margin:0 auto 22px;display:grid;place-items:center;
    border:2px solid var(--red-dim);border-radius:12px;color:var(--red);
    font-family:"Noto Sans JP",system-ui;font-size:46px;font-weight:700;
    text-shadow:0 0 18px rgba(232,71,46,.7);
    background:radial-gradient(circle at 50% 40%, rgba(232,71,46,.12), transparent 70%);
  }
  h1{font-size:18px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}
  p{color:var(--muted);font-size:14px;line-height:1.7;max-width:30ch;margin:0 auto 22px}
  button{
    background:#0a1513;border:1px solid var(--line);color:var(--teal);
    font-family:inherit;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    padding:11px 20px;border-radius:8px;cursor:pointer;transition:.16s;
  }
  button:hover{border-color:#1c5f52;box-shadow:0 0 14px rgba(63,214,176,.25)}
</style>
</head>
<body>
  <div>
    <div class="glyph">斬</div>
    <h1>You're offline</h1>
    <p>The Targeting Pattern Editor needs to be opened online once. After that it works fully offline.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
